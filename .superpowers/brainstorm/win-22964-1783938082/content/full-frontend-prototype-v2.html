<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>量化运营台 - 完整交互原型</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #07111f; }
    iframe { display: block; width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>
  <iframe id="prototype" src="/files/full-frontend-prototype-v1.html" title="量化运营台完整交互原型"></iframe>
  <script>
    document.getElementById("prototype").addEventListener("load", function () {
      var frame = this;
      var doc = frame.contentDocument;
      var win = frame.contentWindow;
      if (!doc || !win || doc.getElementById("mobile-menu-open")) return;

      var style = doc.createElement("style");
      style.textContent =
        ".mobile-menu-open{display:none;border:1px solid #27405f;background:#122741;color:#dce9f8;border-radius:7px;padding:8px 11px;cursor:pointer}" +
        "@media(max-width:820px){.mobile-menu-open{display:inline-flex;align-items:center;gap:6px;margin-bottom:14px}.sidebar.mobile-open{transform:translateX(0);box-shadow:18px 0 45px rgba(0,0,0,.5)}.mobile-mask{display:none;position:fixed;inset:0;background:rgba(2,8,16,.62);z-index:19}.mobile-mask.show{display:block}.topbar{position:relative}}";
      doc.head.appendChild(style);

      var mask = doc.createElement("div");
      mask.className = "mobile-mask";
      mask.id = "mobile-mask";
      mask.onclick = function () {
        doc.getElementById("sidebar").classList.remove("mobile-open");
        mask.classList.remove("show");
      };
      doc.body.appendChild(mask);

      var button = doc.createElement("button");
      button.id = "mobile-menu-open";
      button.className = "mobile-menu-open";
      button.innerHTML = "☰ <span>菜单</span>";
      button.onclick = function () {
        doc.getElementById("sidebar").classList.add("mobile-open");
        mask.classList.add("show");
      };
      doc.querySelector(".title-wrap").insertBefore(button, doc.querySelector(".title-wrap").firstChild);

      doc.querySelectorAll(".menu-item.leaf").forEach(function (item) {
        item.addEventListener("click", function () {
          if (win.innerWidth <= 820) {
            doc.getElementById("sidebar").classList.remove("mobile-open");
            mask.classList.remove("show");
          }
        });
      });
    });
  </script>
</body>
</html>
