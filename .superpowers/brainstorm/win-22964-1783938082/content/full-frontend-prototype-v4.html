  function renderSpec(route,s){

    const side=`<div class="card"><div class="card-head"><h2>${s.side[0]}</h2></div><div class="card-body spec-side-list">${s.side[1].map(i=>`<div class="spec-side-item"><span>${i[0]}</span>${status(i[2]||'neutral',i[1])}</div>`).join('')}</div></div>`;
    const logAudit=route.startsWith('logs/')?`<dt>correlation_id / event_id</dt><dd>CORR-DEMO-001 / EVT-${route.replaceAll('/','-').toUpperCase()}-001</dd><dt>business_date</dt><dd>2026-06-18</dd><dt>event_time / received_at</dt><dd>10:04:29.820 / 10:04:29.846 CST</dd><dt>strategy / rule / fee version</dt><dd>strategy-v2.1 / rules-v1.4 / fee-v1.1</dd><dt>integrity_hash</dt><dd>sha256:prototype-${route.replaceAll('/','-')}</dd>`:'';
    const evidence=`<div class="card"><div class="card-head"><h2>页面血缘与责任</h2></div><div class="card-body"><dl class="kv"><dt>route_id</dt><dd>${route}</dd><dt>data_cutoff</dt><dd>2026-06-18 10:04:30 CST</dd><dt>source_version</dt><dd>PROTOTYPE / schema-v1.0</dd><dt>trace_id</dt><dd>TRACE-${route.replaceAll('/','-').toUpperCase()}</dd>${logAudit}</dl></div></div>`;
    if(s.layout==='full')return `<div data-page-route="${route}" class="spec-page"><section class="grid g4 spec-metrics">${metricHtml}</section><section class="spec-primary spec-primary-full">${primary}</section><section class="grid g2 spec-secondary">${side}${evidence}</section></div>`;
    return `<div data-page-route="${route}" class="spec-page"><section class="grid g4 spec-metrics">${metricHtml}</section><section class="spec-split"><div class="spec-primary">${primary}</div><div class="spec-stack">${side}${evidence}</div></section></div>`
  }
  function render(){const route=(location.hash||'#/overview').replace(/^#\//,'');const spec=pageSpecs[route];const info=routeInfo[route]||(spec?[spec.title,spec.subtitle]:['页面不存在','该路由没有独立页面规范']);document.getElementById('page-title').textContent=info[0];document.getElementById('page-subtitle').textContent=info[1];document.querySelectorAll('[data-route]').forEach(a=>a.classList.toggle('active',a.dataset.route===route));const active=document.querySelector('a.active');document.querySelectorAll('.nav details').forEach(d=>d.open=false);let parent=active?.parentElement;while(parent){if(parent.tagName==='DETAILS')parent.open=true;parent=parent.parentElement}const meta=document.getElementById('global-meta');if(route==='overview'){meta.style.display='none'}else{globalMeta();meta.style.display='grid'}const renderers={overview,readiness,'backtest-validation':backtest,'trade/control':tradeControl,'ai-audit':aiAudit};document.getElementById('view').innerHTML=renderers[route]?renderers[route]():spec?renderSpec(route,spec):`<div class="card not-found">缺少独立页面规范：${route}</div>`;document.querySelector('.sidebar').classList.remove('open');window.scrollTo(0,0)}
