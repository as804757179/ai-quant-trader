version: "3.9"

x-common-env: &common-env
  env_file: .env
  restart: unless-stopped

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    <<: *common-env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: *common-env
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s

  a-stock-data:
    build:
      context: ./a-stock-data/service
      dockerfile: Dockerfile
    <<: *common-env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: *common-env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: development
      LOG_LEVEL: DEBUG
    volumes:
      - ./backend:/app
      - ./vector_db:/app/vector_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      a-stock-data:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    <<: *common-env
    environment:
      API_BASE_URL: http://api:8000
      WORKER_BACKEND_MODE: http
      PYTHONPATH: /app:/backend
    command: celery -A celery_app worker -Q high,normal,low --concurrency=2 --loglevel=debug
    volumes:
      - ./worker:/app
      - ./backend:/backend
    depends_on:
      - redis
      - postgres
      - api

  scheduler:
    build:
      context: .
      dockerfile: worker/Dockerfile
    <<: *common-env
    environment:
      PYTHONPATH: /app:/backend
    command: celery -A celery_app beat --loglevel=debug --scheduler redbeat.RedBeatScheduler
    volumes:
      - ./worker:/app
      - ./backend:/backend
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data: